services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: blogapp
      POSTGRES_PASSWORD: blogapp
      POSTGRES_DB: blogapp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma
      - ./packages/types:/app/packages/types
    environment:
      DATABASE_URL: postgresql://blogapp:blogapp@db:5432/blogapp
      JWT_ACCESS_SECRET: docker-dev-access-secret
      JWT_REFRESH_SECRET: docker-dev-refresh-secret
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      PORT: 3000
      FRONTEND_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/index.html:/app/apps/frontend/index.html
      - ./packages/types:/app/packages/types
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
